apiVersion: apps/v1
kind: Deployment
metadata:
  name: informer
spec:
  replicas: 1
  selector:
    matchLabels:
      component: monitoring
      role: informer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        component: monitoring
        role: informer
    spec:
      containers:
      - env:
        - name: HS_CONFIG_CALLHOME_UPLOADS_DIR
          value: /callhome-uploads
        - name: CALLHOME_RSA_KEY_PATH
          value: /etc/hs/secret/https-callhome-pub-rsa-key/https-callhome-pub-rsa-key.yaml
        image: silkflex.azurecr.io/k2c-containers/informer:ci-2025.05.29_10.06.22-f33d69814e8160bd5a93c1a19893b0d7f9bd4e24
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: informer
        ports:
        - containerPort: 2027
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 10m
            memory: 100Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
        - mountPath: /host
          name: host-fs
          readOnly: true
        - mountPath: /callhome-uploads
          name: callhome-uploads
        - mountPath: /etc/hs/secret/https-callhome-pub-rsa-key
          name: hs-callhome-enc-secret
          readOnly: true
      initContainers:
      - args:
        - -c
        - 'until $(curl --output /dev/null --silent --head --fail http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT);
          do     echo -e "

          $(date) - Waiting on FLEXDB container at (http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT)";     sleep
          2; done; echo -e "

          $(date) - Connection to FLEXDB succeeded";'
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine/curl:8.12.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-informer
        name: hs-conf
      - hostPath:
          path: /tmp/host-fs
          type: DirectoryOrCreate
        name: host-fs
      - hostPath:
          path: /tmp/callhome-uploads
          type: DirectoryOrCreate
        name: callhome-uploads
      - name: hs-callhome-enc-secret
        secret:
          secretName: https-callhome-pub-rsa-key
