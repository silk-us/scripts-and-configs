apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    component: flex
    kind: sts
    role: upgrade-monitor
  name: upgrade-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      component: flex
      kind: sts
      role: upgrade-monitor
  serviceName: upgrade-monitor
  template:
    metadata:
      labels:
        component: flex
        kind: sts
        role: upgrade-monitor
    spec:
      containers:
      - env:
        - name: SERVE_PORT
          value: '5270'
        image: silkflex.azurecr.io/k2c-containers/upgrade-monitor:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: upgrade-monitor
        ports:
        - containerPort: 5270
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 900Mi
          requests:
            cpu: 30m
            memory: 30Mi
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      initContainers:
      - args:
        - -c
        - 'until $(curl --output /dev/null --silent --head --fail http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT);
          do     echo -e "

          $(date) - Waiting on FLEXDB container at (http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT)";     sleep
          2; done; echo -e "

          $(date) - Connection to FLEXDB succeeded";'
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine-curl:8.8.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-upgrade-monitor
        name: hs-conf
  updateStrategy:
    type: RollingUpdate
