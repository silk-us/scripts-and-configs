apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    component: flex
    kind: sts
    role: hostess
  name: hostess
spec:
  replicas: 1
  selector:
    matchLabels:
      component: flex
      kind: sts
      role: hostess
  serviceName: hostess
  template:
    metadata:
      labels:
        component: flex
        kind: sts
        role: hostess
    spec:
      containers:
      - env:
        - name: SERVE_PORT
          value: '2029'
        image: silkflex.azurecr.io/k2c-containers/hostess:ci-2025.05.29_10.06.22-f33d69814e8160bd5a93c1a19893b0d7f9bd4e24
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: hostess
        ports:
        - containerPort: 2029
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 900Mi
          requests:
            cpu: 30m
            memory: 30Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      initContainers:
      - args:
        - -c
        - "# the ENV are passed to container only is service already present\n# if\
          \ FLEXDB_SERVICE_HOST is empty means there is no service odin yet\n# we\
          \ will wait until odin service defined and then restart (exit 1)\n# to start\
          \ waiting it serve\nif [ -z \"$FLEXDB_SERVICE_HOST\" ]; then\n  # service\
          \ not exists, wait until it is up\n  until nslookup flexdb.default.svc.cluster.local\
          \ &> /dev/null; do printf '\\nflexdb service not present, waiting'; sleep\
          \ 2; done\n  # restart initContainer to get ENV defined\n  exit 1;\nelse\n\
          \  # wait until service start response\n  until $(curl --output /dev/null\
          \ --silent --fail http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT/); do\n\
          \    printf '\\nWaiting for FlexDB until starts serving';\n    sleep 2;\n\
          \  done;\nfi\n"
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/appropriate/curl:3.1
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-hostess
        name: hs-conf
  updateStrategy:
    type: RollingUpdate
