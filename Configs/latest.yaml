apiVersion: apps/v1
kind: Deployment
metadata:
  name: locker
spec:
  replicas: 1
  selector:
    matchLabels:
      component: entity_management
      role: locker
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        component: entity_management
        role: locker
    spec:
      containers:
      - env:
        - name: SERVE_PORT
          value: '5090'
        image: silkflex.azurecr.io/k2c-containers/flocker:ci-2025.04.10_15.24.47-fc12dd5065a14314009baad022e1b410c5f88988
        livenessProbe:
          httpGet:
            path: /_status/healthz
            port: 5090
          initialDelaySeconds: 30
          timeoutSeconds: 1
        name: locker
        resources:
          limits:
            memory: 500Mi
          requests:
            cpu: 10m
            memory: 100Mi
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
        - mountPath: /etc/hs
          name: hs-cluster-config
      initContainers:
      - args:
        - -c
        - 'until $(curl --output /dev/null --silent --fail http://$WARDEN_SERVICE_HOST:$WARDEN_SERVICE_PORT/_status/healthz);
          do     printf ''

          Waiting on init container'';     sleep 2; done'
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine/curl:8.12.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-flocker
        name: hs-conf
      - configMap:
          name: hs-cluster-config
        name: hs-cluster-config
