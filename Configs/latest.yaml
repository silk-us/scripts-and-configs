apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    component: flex
    role: cluster-manager
  name: zorg
spec:
  replicas: 1
  selector:
    matchLabels:
      component: flex
      role: cluster-manager
  serviceName: zorg
  template:
    metadata:
      labels:
        component: flex
        role: cluster-manager
    spec:
      containers:
      - env:
        - name: HS_CONFIG_FLEX_FILE_AZURE
          value: /etc/cc/conf/config-azure.yaml
        - name: HS_CONFIG_FLEX_FILE_GCP
          value: /etc/cc/conf/config-gcp.yaml
        - name: HS_CONFIG_FLEX_FILE_AWS
          value: /etc/cc/conf/config-aws.yaml
        - name: HS_CONFIG_NODE_FILE
          value: /etc/hs/node-conf/node-config.yaml
        image: silkflex.azurecr.io/k2c-containers/zorg:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: zorg
        ports:
        - containerPort: 2045
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 500Mi
          requests:
            cpu: 10m
            memory: 100Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
        - mountPath: /etc/cc/conf
          name: cc-conf
        - mountPath: /etc/hs/node-conf
          name: node-config
      initContainers:
      - args:
        - -c
        - "# the ENV are passed to container only is service already present\n# if\
          \ ODIN_SERVICE_HOST is empty means there is no service odin yet\n# we will\
          \ wait until odin service defined and then restart (exit 1)\n# to start\
          \ waiting it serve\nif [ -z \"$ODIN_SERVICE_HOST\" ]; then\n  # service\
          \ not exists, wait until it is up\n  until nslookup odin.default.svc.cluster.local\
          \ &> /dev/null; do printf '\\nodin service not present, waiting'; sleep\
          \ 2; done\n  # restart initContainer to get ENV defined\n  exit 1;\nelse\n\
          \  # wait until service start response\n  until $(curl --output /dev/null\
          \ --silent --fail http://$ODIN_SERVICE_HOST:$ODIN_SERVICE_PORT/_status/healthz);\
          \ do\n    printf '\\nWaiting for Odin until starts serving';\n    sleep\
          \ 2;\n  done;\nfi\n"
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine/curl:8.12.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-zorg
        name: hs-conf
      - hostPath:
          path: /etc/conf
        name: cc-conf
      - configMap:
          name: node-config-v1.95.30
        name: node-config
