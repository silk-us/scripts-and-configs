apiVersion: apps/v1
kind: Deployment
metadata:
  name: flexdb
spec:
  replicas: 1
  selector:
    matchLabels:
      component: database
      role: flexdb
      vendor: elasticsearch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        component: database
        role: flexdb
        vendor: elasticsearch
    spec:
      containers:
      - env:
        - name: NETWORK_HOST
          value: _lo_,_eth0_
        - name: CLUSTER_NAME
          value: ic2602
        - name: ES_HEAP_SIZE_PCT
          value: '0.5'
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: silkflex.azurecr.io/k2c-containers/elasticsearch-metadb8:ci-2025.02.20_07.45.28-fbdb1bda7a2078545cb36e65abb0886152675fe9
        name: es
        ports:
        - containerPort: 9200
          name: http
          protocol: TCP
        - containerPort: 9300
          name: transport
          protocol: TCP
        resources:
          limits:
            memory: 4Gi
          requests:
            cpu: 10m
            memory: 10Mi
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
            - SYS_RESOURCE
          privileged: true
        volumeMounts:
        - mountPath: /data
          name: storage
      initContainers:
      - args:
        - '# https://www.elastic.co/guide/en/elasticsearch/reference/current/vm-max-map-count.html

          sysctl -w vm.max_map_count=262144

          # represents the percentage of the free memory before activating swap. The
          lower the value,

          # the less swapping is used and the more memory pages are kept in physical
          memory.

          # https://www.elastic.co/guide/en/elasticsearch/reference/current/setup-configuration-memory.html#swap-space

          sysctl -w vm.swappiness=1

          # volume permissions

          chmod -R 755 /data && chown 1000:1000 /data

          '
        command:
        - /bin/sh
        - -c
        image: silkflex.azurecr.io/k2c-containers/alpine:3.20.5
        imagePullPolicy: IfNotPresent
        name: bootstrap
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /data
          name: storage
      volumes:
      - hostPath:
          path: /data8
        name: storage
