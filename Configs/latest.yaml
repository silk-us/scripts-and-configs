apiVersion: apps/v1
kind: Deployment
metadata:
  name: authenticator
spec:
  replicas: 1
  selector:
    matchLabels:
      component: security
      role: authenticator
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        component: security
        role: authenticator
    spec:
      containers:
      - env:
        - name: SERVE_PORT
          value: '3000'
        image: silkflex.azurecr.io/k2c-containers/fauthenticator:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        name: authenticator
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 10m
            memory: 10Mi
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      initContainers:
      - args:
        - -c
        - 'until $(curl --output /dev/null --silent --fail http://$WARDEN_SERVICE_HOST:$WARDEN_SERVICE_PORT/_status/healthz);
          do      echo -e "

          $(date) - Waiting on WARDEN container at (http://$WARDEN_SERVICE_HOST:$WARDEN_SERVICE_PORT/_status/healthz)";     sleep
          2; done; echo -e "

          $(date) - Connection to WARDEN succeeded";'
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine/curl:8.12.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-fauthenticator
        name: hs-conf
