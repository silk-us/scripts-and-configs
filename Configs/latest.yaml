      labels:
        component: frontend
        role: sdpproxy
    spec:
      containers:
      - image: silkflex.azurecr.io/k2c-containers/sdpproxy:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: sdpproxy
        ports:
        - containerPort: 2028
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 500Mi
          requests:
            cpu: 10m
            memory: 100Mi
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      initContainers:
      - args:
        - -c
        - 'until $(curl --output /dev/null --silent --head --fail http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT);
          do   echo -e "

          $(date) - Waiting on FLEXDB container at (http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT)";
          sleep 2; done; echo -e "

          $(date) - Connection to FLEXDB succeeded";'
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine-curl:8.8.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-sdpproxy
        name: hs-conf
  updateStrategy:
    type: RollingUpdate
