apiVersion: apps/v1
kind: Deployment
metadata:
  name: claritygw
spec:
  replicas: 1
  selector:
    matchLabels:
      component: flex
      kind: deploy
      role: claritygw
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        component: flex
        kind: deploy
        role: claritygw
    spec:
      containers:
      - env:
        - name: SERVE_PORT
          value: '5190'
        image: silkflex.azurecr.io/k2c-containers/claritygw:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: claritygw
        ports:
        - containerPort: 5190
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 900Mi
          requests:
            cpu: 30m
            memory: 30Mi
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      initContainers:
      - args:
        - -c
        - "# Environment variables are passed to the container only if the service\
          \ already exists.\n# If the variable is empty, it means the service is not\
          \ up yet and so we will wait until the service\n# is defined and then we\
          \ will restart the container.\n\nif [ -z \"$FLEXAPI_SERVICE_HOST\" ]; then\n\
          \  # It appears service does not exists, lets wait until nslookup finds\
          \ it\n  echo -e \"INFO:\\FLEXAPI service is not present, waiting for it\"\
          \n  until nslookup flexapi.default.svc.cluster.local &> /dev/null; do printf\
          \ '\\nERROR:\\FLEXAPI service is not present, waiting'; sleep 2; done\n\
          \  echo -e \"INFO:\\FLEXAPI service is present, restarting the container\"\
          \n  exit 1;  # Restart the container to get the environment variables\n\
          else\n  # So service is up, lets wait until it responds with http 200 code\n\
          \n  url=\"http://$FLEXAPI_SERVICE_HOST:$FLEXAPI_SERVICE_PORT/healthz\"\n\
          \  expected_response_code=200\n\n  while true; do\n      echo -e \"INFO:\\\
          tCalling FLEXAPI health check service ($url)\"\n\n      # Note the double\
          \ curly braces in the following line.\n      # It is meant to overcome the\
          \ string formatting we are doing in hs_cluster_tool deploy_module.py\n \
          \     # When testing this script in a native bash environment, you should\
          \ remove this braces duplication\n      http_response_code=$(curl -s -o\
          \ /dev/null -w \"%{http_code}\" $url)\n\n      echo -e \"INFO:\\tResponse\
          \ code ($url) is $http_response_code\"\n\n      if [ $http_response_code\
          \ -eq $expected_response_code ]; then\n              echo -e \"INFO:\\tDone\"\
          \n              break  # Exit the loop\n      else\n              echo -e\
          \ \"ERROR:\\tResponse code=$http_response_code (expecting $expected_response_code),\
          \ retrying in 2 seconds\"\n              sleep 2  # Sleep for 2 seconds\n\
          \      fi\n  done\nfi\n"
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/appropriate/curl:3.1
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-claritygw
        name: hs-conf
