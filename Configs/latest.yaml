apiVersion: apps/v1
kind: Deployment
metadata:
  name: awsconnector
spec:
  replicas: 2
  selector:
    matchLabels:
      component: cloud
      role: awsconnector
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        component: cloud
        role: awsconnector
    spec:
      containers:
      - env:
        - name: THREAD_QUANTITY
          value: '50'
        - name: HS_CONFIG_FLEX_FILE
          value: /etc/cc/conf/config-aws.yaml
        image: silkflex.azurecr.io/k2c-containers/awsconnector:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: awsconnector
        ports:
        - containerPort: 2026
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 100Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/cc/conf/
          name: cc-conf
        - mountPath: /etc/hs/conf
          name: hs-conf
      volumes:
      - configMap:
          name: hs-conf-awsconnector
        name: hs-conf
      - hostPath:
          path: /etc/conf/
        name: cc-conf
