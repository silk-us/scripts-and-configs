apiVersion: apps/v1
kind: Deployment
metadata:
  name: flexapi
spec:
  replicas: 1
  selector:
    matchLabels:
      component: flex
      role: flexapi
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        component: flex
        role: flexapi
    spec:
      containers:
      - env:
        - name: FLEX_VERSION
          value: v1.95.30
        - name: HS_CONFIG_FLEX_FILE_AZURE
          value: /etc/cc/conf/config-azure.yaml
        - name: HS_CONFIG_FLEX_FILE_GCP
          value: /etc/cc/conf/config-gcp.yaml
        - name: HS_CONFIG_FLEX_FILE_AWS
          value: /etc/cc/conf/config-aws.yaml
        image: silkflex.azurecr.io/k2c-containers/flexapi:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: flexapi
        ports:
        - containerPort: 5130
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 500Mi
          requests:
            cpu: 10m
            memory: 10Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
        - mountPath: /etc/cc/conf
          name: cc-conf
        - mountPath: /var/log/flex
          name: varlogflex
      initContainers:
      - args:
        - -c
        - 'until $(curl --output /dev/null --silent --fail http://$WARDEN_SERVICE_HOST:$WARDEN_SERVICE_PORT/_status/healthz);
          do      echo -e "

          $(date) - Waiting on WARDEN container at (http://$WARDEN_SERVICE_HOST:$WARDEN_SERVICE_PORT/_status/healthz)";     sleep
          2; done; echo -e "

          $(date) - Connection to WARDEN succeeded";'
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine/curl:8.12.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-flexapi
        name: hs-conf
      - hostPath:
          path: /etc/conf
        name: cc-conf
      - hostPath:
          path: /var/log/flex
        name: varlogflex
