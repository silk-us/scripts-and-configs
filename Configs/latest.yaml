apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    component: flex
    role: nodemanager
  name: nodemanager
spec:
  replicas: 1
  selector:
    matchLabels:
      component: flex
      role: nodemanager
  serviceName: nodemanager
  template:
    metadata:
      labels:
        component: flex
        role: nodemanager
    spec:
      containers:
      - image: silkflex.azurecr.io/k2c-containers/nodemanager:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: nodemanager
        ports:
        - containerPort: 2046
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 500Mi
          requests:
            cpu: 1m
            memory: 1Mi
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      initContainers:
      - args:
        - -c
        - 'until $(curl --output /dev/null --silent --head --fail http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT);
          do echo -e "

          $(date) - Waiting on FLEXDB container at (http://$FLEXDB_SERVICE_HOST:$FLEXDB_SERVICE_PORT)";
          sleep 2; done; echo -e "

          $(date) - Connection to FLEXDB succeeded";'
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine-curl:8.8.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-nodemanager
        name: hs-conf
