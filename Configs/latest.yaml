        defaults:
          number_of_replicas: 1
          number_of_shards: 5
      seed:
      - elasticsearch
    gatekeeper:
      topology:
        produce_volatile_k2ns: true
    logconf:
      config:
        formatters: {}
        handlers:
          console:
            class: logging.StreamHandler
            formatter: simple
            level: INFO
          console_refid:
            class: logging.StreamHandler
            formatter: refid
            level: INFO
        root:
          handlers:
          - console
          level: INFO
          propagate: false
    service_level:
      default: silver
    services:
      flexdb:
        host: flexdb
        port: 9200
        scheme: http
      k2datadb:
        host: elasticsearch
        port: 9200
      metadb:
        host: elasticsearch
        port: 9200
        scheme: http
