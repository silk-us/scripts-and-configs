apiVersion: apps/v1
kind: Deployment
metadata:
  name: makara
spec:
  replicas: 1
  selector:
    matchLabels:
      component: flex
      role: makara
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        component: flex
        role: makara
    spec:
      containers:
      - image: silkflex.azurecr.io/k2c-containers/makara:ci-2025.04.10_15.24.47-fc12dd5065a14314009baad022e1b410c5f88988
        name: makara
        ports:
        - containerPort: 5180
          name: http
        resources:
          limits:
            memory: 500Mi
          requests:
            cpu: 10m
            memory: 100Mi
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      initContainers:
      - args:
        - -c
        - "# Environment variables are passed to the container only if the service\
          \ already exists.\n# If the variable is empty, it means the service is not\
          \ up yet and so we will wait until the service\n# is defined and then we\
          \ will restart the container.\n\nif [ -z \"$WARDEN_SERVICE_HOST\" ]; then\n\
          \  # It appears service does not exists, lets wait until nslookup finds\
          \ it\n  echo -e \"INFO:\\tWARDEN service is not present, waiting for it\"\
          \n  until nslookup warden.default.svc.cluster.local &> /dev/null; do printf\
          \ '\\nERROR:\\tWARDEN service is not present, waiting'; sleep 2; done\n\
          \  echo -e \"INFO:\\tWARDEN service is present, restarting the container\"\
          \n  exit 1;  # Restart the container to get the environment variables\n\
          else\n  # So service is up, lets wait until it responds with http 200 code\n\
          \n  url=\"http://$WARDEN_SERVICE_HOST:$WARDEN_SERVICE_PORT/_status/healthz\"\
          \n  expected_response_code=200\n\n  while true; do\n      echo -e \"INFO:\\\
          tCalling WARDEN health check service ($url)\"\n\n      # Note the double\
          \ curly braces in the following line.\n      # It is meant to overcome the\
          \ string formatting we are doing in hs_cluster_tool deploy_module.py\n \
          \     # When testing this script in a native bash environment, you should\
          \ remove this braces duplication\n      http_response_code=$(curl -s -o\
          \ /dev/null -w \"%{http_code}\" $url)\n\n      echo -e \"INFO:\\tResponse\
          \ code ($url) is $http_response_code\"\n\n      if [ $http_response_code\
          \ -eq $expected_response_code ]; then\n              echo -e \"INFO:\\tDone\"\
          \n              break  # Exit the loop\n      else\n              echo -e\
          \ \"ERROR:\\tResponse code=$expected_response_code (expecting $expected_response_code),\
          \ retrying in 2 seconds\"\n              sleep 2  # Sleep for 2 seconds\n\
          \      fi\n  done\nfi\n"
        command:
        - sh
        image: silkflex.azurecr.io/k2c-containers/alpine/curl:8.12.0
        name: deploy
      volumes:
      - configMap:
          name: hs-conf-makara
        name: hs-conf
