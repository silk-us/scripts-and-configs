apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-clean-sso-users
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            component: hs-job
            role: cleaner
        spec:
          containers:
          - command:
            - clean_sso_users
            image: silkflex.azurecr.io/k2c-containers/fauthenticator:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
            imagePullPolicy: IfNotPresent
            name: cronjob-clean-sso-users
            resources:
              limits:
                memory: 500Mi
            volumeMounts:
            - mountPath: /etc/hs/conf
              name: hs-conf
          restartPolicy: OnFailure
          volumes:
          - configMap:
              name: hs-conf-fauthenticator
            name: hs-conf
  schedule: 0 8 * * *
  startingDeadlineSeconds: 3600
