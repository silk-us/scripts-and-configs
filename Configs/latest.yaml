apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdpconnector
spec:
  replicas: 1
  selector:
    matchLabels:
      component: flex
      kind: deploy
      role: sdpconnector
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        component: flex
        kind: deploy
        role: sdpconnector
    spec:
      containers:
      - env:
        - name: SERVE_PORT
          value: '5290'
        image: silkflex.azurecr.io/k2c-containers/sdpconnector:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        name: sdpconnector
        ports:
        - containerPort: 5290
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          limits:
            memory: 900Mi
          requests:
            cpu: 30m
            memory: 30Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      initContainers:
      - args:
        - flexdb
        command:
        - wait-for-services
        image: silkflex.azurecr.io/k2c-containers/sdpconnector:ci-2025.04.20_15.15.27-90035529dc6889f24ff4237ac2d10d8b33e44be3
        name: deploy
        volumeMounts:
        - mountPath: /etc/hs/conf
          name: hs-conf
      volumes:
      - configMap:
          name: hs-conf-sdpconnector
        name: hs-conf
